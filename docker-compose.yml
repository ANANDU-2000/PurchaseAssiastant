# Local PostgreSQL + Redis for HEXA backend
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hexa
      POSTGRES_PASSWORD: hexa
      POSTGRES_DB: hexa
    ports:
      - "5432:5432"
    volumes:
      - hexa_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  hexa_pg:
